components:
  schemas:

    TableSpec:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
          pattern: ^[A-Za-z][A-Za-z0-9_]*$
        description:
          type: string
        type:
          type: string
          enum:
          - partitioned
          - splayed
          - splayed_mem
          - basic
        blockSize:
          type: integer
          description: Block size for partitioned storage writes.
          default: 10000
          example: 10000
        prtnCol:
          type: string
          description: |
            Partition column to use for partitioned tables. The column chosen is your primary time filter: it is used by a query's `startTS`/`endTS` and determines the data layout on disk.

              - Required when table `type="partitioned"`.
              - `prtnCol` must reference a `timestamp` column.
              - Always considered UTC.

        sortColsMem:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in a memory tier. Setting this value will sort data as it arrives in memory.
          example: [sym]
        sortColsOrd:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in an ordinal partitioned tier. Setting this value will sort data as it migrates into ordinal partitions.
          example: [sym]
        sortColsDisk:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in a normal disk tier. Settings this value will sort data as it is migrated into disk partitions.
          example: [sym]
        primaryKeys:
          type: array
          items:
            type: string
          description: Names of columns to use as primary keys for this table. Primary keys identify unique rows. When provided, the table is keyed by these columns, and rows with matching keys update existing records.
          example: [sym, realTime]
        columns:
          type: array
          items:
            $ref: '#/components/schemas/TableColumnSpec'
      required:
      - name
      - columns
      additionalProperties: false

    CreateTableRequest:
      type: object
      properties:
        type:
          type: string
          enum:
          - partitioned
          - splayed
          - splayed_mem
          - basic
        prtnCol:
          type: string
          description: |
            Partition column to use for partitioned tables. The column chosen is your primary time filter: it is used by a query's `startTS`/`endTS` and determines the data layout on disk.

              - Required when table `type="partitioned"`.
              - `prtnCol` must reference a `timestamp` column.
              - Always considered UTC.

        columns:
          type: array
          items:
            $ref: '#/components/schemas/TableColumnSpec'
        primaryKeys:
          type: array
          items:
            type: string
          description: Names of columns to use as primary keys for this table. Primary keys identify unique rows. When provided, the table is keyed by these columns, and rows with matching keys update existing records.
          example: [sym, realTime]
        blockSize:
          type: integer
          description: Block size for partitioned storage writes.
          default: 10000
          example: 10000
        sortColsMem:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in a memory tier. Setting this value will sort data as it arrives in memory.
          example: [sym]
        sortColsOrd:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in an ordinal partitioned tier. Setting this value will sort data as it migrates into ordinal partitions.
          example: [sym]
        sortColsDisk:
          type: array
          items:
            type: string
          description: A list of columns to use for sorting columns in a normal disk tier. Settings this value will sort data as it is migrated into disk partitions.
          example: [sym]
        description:
          type: string
      oneOf:
      - title: Partitioned table request
        properties:
          type:
            enum: [partitioned]
        required:
        - prtnCol
      - title: Non-partitioned table request
        properties:
          type:
            enum: [splayed, splayed_mem, basic]
      required:
      - type
      - columns
      additionalProperties: false

    TableColumnSpec:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: 'The name of the column in the table. Must be unique within the table and conform to kdb+ naming restrictions: avoid reserved primitives (`.Q.id`), reserved words `date`/`int`, and reserved prefix `label_`.'
          example: sym
        type:
          type: string
          description: The type of the column (for example `symbol`, `timestamp`, `float`, `long`).
          example: symbol
        description:
          type: string
          description: Optional textual description of the column for documentation purposes.
          example: Instrument symbol
        attrMem:
          type: string
          description: Column attribute to apply in memory (typically RDB tier). See [attribute details](https://code.kx.com/insights/microservices/database/configuration/assembly/schema.html#attributes).
          example: grouped
        attrOrd:
          type: string
          description: Column attribute to apply in ordinal partitions (typically IDB tier). See [attribute details](https://code.kx.com/insights/microservices/database/configuration/assembly/schema.html#attributes).
          example: parted
        attrDisk:
          type: string
          description: Column attribute to apply on disk partitions (typically HDB tier). See [attribute details](https://code.kx.com/insights/microservices/database/configuration/assembly/schema.html#attributes).
          example: parted
        # foreign:
        #   type: string
        #   description: Optional foreign-key reference in `table.column` form. If provided, this column type should match the referenced column type.
        #   example: instruments.sym
        # anymap:
        #   type: boolean
        #   description: Indicates if nested data can be stored as a memory-mapped anymap file. Compression is not currently supported for anymap columns.
        #   default: false
      required:
      - name
      - type

    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              code:
                type: string
                description: Stable, machine-readable error code.
              title:
                type: string
                description: Short, human-readable summary.
              detail:
                type: string
                description: Longer explanation for debugging.
              retryable:
                type: boolean
                description: Whether the client may retry safely.
            required:
            - code
            - title
            - retryable
            additionalProperties: false
        meta:
          type: object
          properties:
            corrId:
              type: string
            updatedAt:
              type: string
              format: date-time
              description: Time this response was last updated.
          required: [corrId, updatedAt]
          additionalProperties: false
      required:
      - errors
      - meta
      additionalProperties: false
    SimpleErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
      additionalProperties: false
    SuccessEnvelope:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          type: object
        meta:
          type: object
          properties:
            corrId:
              type: string
            updatedAt:
              type: string
              format: date-time
              description: Time this response was last updated.
          required: [corrId, updatedAt]
          additionalProperties: false
      additionalProperties: false
    DropTableResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        properties:
          data:
            type: object
            additionalProperties: false
            properties:
              jobId:
                type: string
                description: Job identifier for tracking the schema change.
              status:
                type: string
                enum: [pending, running, completed, failed, canceled]
              statusUri:
                type: string
                format: uri-reference
              startedAt:
                type: string
                format: date-time
                description: Time the job started processing.
              finishedAt:
                type: string
                format: date-time
                nullable: true
                description: Time the job finished; null while still running.
              table:
                type: string
              warnings:
                type: array
                items:
                  type: string
            required:
            - jobId
            - status
            - statusUri
            - startedAt
            - finishedAt
            - table
            - warnings
        required:
        - data

    CreateTableResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        properties:
          data:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                enum: [completed]
                description: Status of the create-table operation.
              startedAt:
                type: string
                format: date-time
                description: Time processing started.
              finishedAt:
                type: string
                format: date-time
                description: Time processing finished.
              table:
                type: string
                description: Table name.
              warnings:
                type: array
                items:
                  type: string
            required:
            - status
            - startedAt
            - finishedAt
            - table
            - warnings
        required:
        - data

    DataIngestResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        properties:
          data:
            type: object
            properties:
              table:
                type: string
              rowsInserted:
                type: integer
            required:
            - table
            - rowsInserted
            additionalProperties: false
        required:
        - data

    BatchIngestAcceptedResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        properties:
          data:
            type: object
            properties:
              jobId:
                type: string
                description: Job identifier for tracking the batch ingest.
              status:
                type: string
              statusUri:
                type: string
                description: Relative URI to poll for job status.
                format: uri-reference
              startedAt:
                type: string
                format: date-time
                description: Time the job started processing.
              finishedAt:
                type: string
                format: date-time
                nullable: true
                description: Time the job finished; null while still running.
            required:
            - jobId
            - status
            - statusUri
            additionalProperties: false
        required:
        - data

    BatchIngestStatusResponse:
      type: object
      properties:
        name:
          type: string
          description: Unique identifier for the import job.
        pipeline:
          type: string
          description: Internal pipeline identifier used to process the job.
        database:
          type: string
          description: Target database where the operation is applied.
        updtype:
          type: string
          description: Type of operation being performed, such as file ingest, data ingest, kdb ingest, or cancel.
        status:
          type: string
          description: Current state of the job, for example `pending`, `processing`, `completed`, `errored`, or `canceled`.
        details:
          description: Additional information about the resources affected by this job. Can be empty for schema operations.
          oneOf:
          - type: object
            properties:
              workerHandle:
                type: integer
                description: Internal worker handle processing this job.
              preprocessDone:
                type: string
                description: Time preprocessing completed for this job.
              subsessions:
                type: array
                items:
                  type: string
                description: Internal subsession identifiers used during processing.
              dates:
                type: array
                items:
                  type: string
                  format: date
                description: Date partitions affected by this job.
              tables:
                type: array
                items:
                  type: string
                description: Tables affected by this job.
            additionalProperties: false
          - type: array
            items: {}
        tbls:
          type: array
          items:
            type: string
          description: Table or tables currently being processed by the job.
        dates:
          type: array
          items:
            type: string
            format: date
          description: Date partition or partitions currently being processed by the job.
        progress:
          type: object
          description: Progress information for the job, including top-level and nested work units.
          properties:
            cmdCurrent:
              type: string
              description: Current top-level work unit i.e. date partition.
            cmdIndex:
              type: integer
              nullable: true
              description: Zero-based index of the current top-level work unit.
            cmdTotal:
              type: integer
              nullable: true
              description: Total number of top-level work units in the job.
            subCurrent:
              type: string
              description: Current nested work unit i.e. table.
            subIndex:
              type: integer
              nullable: true
              description: Zero-based index of the current nested work unit.
            subTotal:
              type: integer
              nullable: true
              description: Total number of nested work units for the current top-level work unit.
          additionalProperties: false
        error:
          type: string
          description: Error message returned if the job fails.
        warnings:
          type: array
          items:
            type: string
          description: Non-fatal warnings generated while processing the job.
        updated:
          type: string
          format: date-time
          description: Timestamp of the most recent status update for this job.
      required:
      - name
      - pipeline
      - database
      - updtype
      - status
      - updated
      additionalProperties: false


    FileIngestRequest:
      type: object
      additionalProperties: false
      required:
        - table
        - path
      properties:
        table:
          type: string
          description: Target table name.
          example: quote
        path:
          type: string
          description: 'Path to input data on the server filesystem.


            Accepted forms:

            - Single file

            - Directory

            - Glob pattern


            Glob semantics:

            - `*` matches within a single path segment (does not cross `/`).

            - `**` matches across subdirectories, e.g. `quotes/**/quote*.csv`.


            The service ingests all matched files.


            Example values:

            - `quote.csv`

            - `quotes/`

            - `quote_2026-01-*.csv`

            - `quotes/**/quote*.csv`

            '
          example: quote.csv
        format:
          type: string
          description: Input data format. If omitted, the service may auto-detect it from the file(s).
          enum:
          - qbinary
          - csv
          - parquet
        mode:
          type: string
          description: 'Optional ingest mode. If omitted, the service uses `merge` behavior. Mode behavior is applied per partition.'
          enum:
          - overwrite
          - merge
          default: merge
        delimiter:
          type: string
          description: Delimiter character for delimited text. Ignored for parquet and qbinary.
          default: ','
        decimal:
          type: string
          description: Decimal separator character for delimited text. Ignored for parquet and qbinary.
          default: .
          example: .
        createTable:
          type: boolean
          description: If true and the table does not exist, create it prior to ingest.
          default: false
        header:
          type: array
          items:
            type: string
          description: 'If the file has headers, this is optional.


            If provided, it overrides header names by position.


            If the file has no headers and either postparse is used or the file has unused columns, this is required (names by position).


            If createTable=true and the table doesn’t exist, these headers are used as the new table’s column names.

            '
          example:
          - time
          - sym
          - realTime
          - bid
          - ask
          - bidSize
          - askSize
        include:
          type: array
          items:
            type: string
          description: 'Optional list of column names to ingest (and their order).


            Only these columns are kept.


            Applied after both headers are resolved & postparse is applied.

            '
          example:
          - sym
          - realTime
          - bid
          - ask
        types:
          type: string
          description: Optional type string in CSV parse format (uppercase), e.g. F=float, J=long, P=timestamp, S=symbol, *=string. See https://code.kx.com/q/ref/tok/ for full details.
          example: SPFF
        postparse:
          type: object
          additionalProperties:
            type: string
          description: |
            A dictionary of data transforms, made up of column names as keys and q expression strings as values.


            Existing columns can be modified, and new ones created. 
            
            Columns from the file are available for use in the expression via a `data` dictionary variable, and the file name is available via a `path` string variable.

            For example: {'timestamp': 'data[&#96;date]+data[&#96;time]'}.

            Runs after loading and parsing (including typecasting) of data in the file is done.

            Note that columns used as inputs in the transform are by default not included after use, therefore must be re-added if they are required. 
            
            For example, to preserve the date column in the above, the `postparse` dictionary should be: {'timestamp': 'data[&#96;date]+data[&#96;time]', 'date': 'data[`date]'}

        headerRowIndex:
          type: integer
          description: Header row index (0-based). Use -1 when there is no header row.
          default: 0
          example: 0

    KdbIngestRequest:
      type: object
      additionalProperties: false
      required:
      - path
      properties:
        path:
          type: string
          description: Path to a kdb-native data location readable by the service, such as a partitioned HDB directory, a parent directory containing one or more splayed tables, or a parent directory containing basic/q-binary tables. Path is resolved relative to the configured import root.
        mode:
          type: string
          description: 'Optional ingest mode. If omitted, the service uses `merge` behavior. Mode behavior is applied per partition.'
          enum:
          - overwrite
          - merge
          default: merge
        createTable:
          type: boolean
          description: If true and the target table does not exist, create it before ingest.
          default: false

    DataIngestRequest:
      type: object
      additionalProperties: false
      required:
        - table
        - data
      properties:
        table:
          type: string
          description: Target table name.
        data:
          oneOf:
          - type: array
            description: Array of rows; each row is an array of values aligned to column order.
            items:
              type: array
              items: {}
          - type: array
            description: Array of row objects; each object is a row with column names as keys.
            items:
              type: object
              additionalProperties: false
        createTable:
          type: boolean
          default: false
        mode:
          type: string
          description: 'Optional ingest mode. If omitted, the service uses `merge` behavior. Mode behavior is applied per partition.'
          enum:
          - overwrite
          - merge
          default: merge
        columnNames:
          type: array
          items:
            type: string
        types:
          type: string
          description: Optional type string (case-sensitive), e.g. f=float, j=long, p=timestamp, s=symbol, C=string, *=generic list. See https://code.kx.com/q/ref/cast/ for full details.

    StructuredRequest:
      type: object
      properties:
        table:
          type: string
          description: Table name
          x-kx-type: -11h
        startTS:
          description: Inclusive start of timestamp range
          type: string
          x-kx-type: -12h
        endTS:
          description: Exclusive end of timestamp range
          type: string
          x-kx-type: -12h
        inputTZ:
          description: |
            Timezones should be supplied in [tz database format](https://timezonedb.com/download), for example `America/New_York` or `Europe/London`. `inputTZ` is used to interpret `startTS` and `endTS`.
          type: string
        outputTZ:
          description: |
            Timezones should be supplied in [tz database format](https://timezonedb.com/download), for example `America/New_York` or `Europe/London`. `outputTZ` is used for timestamp conversion in query output.
          type: string
        outputTZCols:
          description: Columns that should be converted to 'outputTZ'
          type: array
          items:
            type: array
            items:
              type: string
              x-kx-type: -11h
        filter:
          description: |
            The `filter` parameter takes a list of filter triples in the following form: 
            
            - `[operator, column, values]`

            It is also possible to nest filters with the logical operators `and`, `not`, and `or`, for example:
            
            - `["and", ["=", "size", 100], ["<", "price", 500]]`

            Supported filter operators are `=`, `<>`, `<`, `>`, `<=`, `>=`, `in`, `like`, `within`.

          type: array
          items:
            oneOf:
            - type: string
            - type: array
        groupBy:
          description: A list of column names to group by
          type: array
          items:
            type: string
            x-kx-type: -11h
        agg:
          description: |
            `agg` controls what the query returns. Use it to select columns, rename columns, or compute aggregated values.

            1. A simple list of column names specifies what columns to include in the result:

              ```json
              ["sym", "bid", "ask"]
              ```

            2. A list of tuples specifies what columns to include in the result, and renames them:

              ```json
              [["Symbol", "sym"], ["BidPrice", "bid"], ["AskPrice", "ask"]]
              ```

            3. A list of triples runs the given aggregation function on the specified column and renames it:

              ```json
              [
                ["o", "first", "bid"],
                ["h", "max", "bid"],
                ["l", "min", "bid"],
                ["c", "last", "bid"]
              ]
              ```

            Available aggregation functions are:

            [all](https://code.kx.com/q/ref/all-any/), [any](https://code.kx.com/q/ref/all-any/), [avg](https://code.kx.com/q/ref/avg/), [cor](https://code.kx.com/q/ref/cov/), [count](https://code.kx.com/q/ref/count/), [cov](https://code.kx.com/q/ref/cov/), [dev](https://code.kx.com/q/ref/dev/), [distinct](https://code.kx.com/q/ref/distinct/), [first](https://code.kx.com/q/ref/first/), [last](https://code.kx.com/q/ref/first/), [max](https://code.kx.com/q/ref/max/), [min](https://code.kx.com/q/ref/min/), [prd](https://code.kx.com/q/ref/prd/), [scov](https://code.kx.com/q/ref/cov/), [sdev](https://code.kx.com/q/ref/dev/), [sum](https://code.kx.com/q/ref/sum/), [svar](https://code.kx.com/q/ref/cov/), [var](https://code.kx.com/q/ref/cov/), [wavg](https://code.kx.com/q/ref/avg/), [wsum](https://code.kx.com/q/ref/sum/).

            Note: [distinct](https://code.kx.com/q/ref/distinct/) always returns a list.

          type: array
          items:
            type: array
            items:
              type: string
              x-kx-type: -11h
        fill:
          description: '`fill` can be used to fill in null values:


            - `forward` will replace nulls with the previous non-null value.

            - `zero` will replace nulls with the 0 equivalent value of the column type.

            '
          type: string
          x-kx-type: -11h
        temporality:
          type: string
          description: |
            Temporality controls how the query interprets the time range between `startTS` and `endTS`.

            Supported values are:

            - `snapshot`  Returns one continuous block of data from `startTS` to `endTS`. This is the default if temporality is not specified.

            - `slice`  Returns data between the time of `startTS` and the time of `endTS` for each day in the date range. For example, if `startTS` is `2021.01.01D10:00:00` and `endTS` is `2021.01.03D13:00:00`, data is returned from `10:00:00` to `13:00:00` on each of these dates:

              - 2021.01.01
              - 2021.01.02
              - 2021.01.03
          x-kx-type: -11h
        sortCols:
          description: Columns to be sorted, post query execution
          type: array
          items:
            type: string
            x-kx-type: -11h
        limit:
          description: Limit of rows to return
          type: array
          items:
            type: integer
            x-kx-type: -6h
      required:
      - table

    QueryGatewayError:
      type: object
      properties:
        header:
          type: object
          properties:
            corr:
              type: string
            logCorr:
              type: string
            rcvTS:
              type: string
            http:
              type: string
            api:
              type: string
            agg:
              type: string
            refVintage:
              type: integer
            rc:
              type: integer
            ac:
              type: integer
            ai:
              type: string
          required:
          - corr
          - logCorr
          - rcvTS
          - http
          - api
          - agg
          - refVintage
          - rc
          - ac
          - ai
        payload:
          type: array
          items: {}
      required:
      - header
      - payload

    ErrorQueryResponse:
      type: object
      properties:
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              code:
                type: string
              title:
                type: string
              retryable:
                type: boolean
            required:
            - code
            - message
            - retryable
            additionalProperties: false
        meta:
          type: object
          properties:
            corrId:
              type: string
            updatedAt:
              type: string
              format: date-time
              description: Time this response was last updated.
            rcvTS:
              type: string
            http:
              type: string
            api:
              type: string
            agg:
              type: string
            refVintage:
              type: integer
            rc:
              type: integer
            ac:
              type: integer
          required: [corrId, updatedAt]
          additionalProperties: false
      required:
      - errors
      - meta
      additionalProperties: false

    QueryResponse:
      type: object
      properties:
        header:
          $ref: '#/components/schemas/QueryHeader'
        payload:
          type: array
          items:
            type: object
            additionalProperties: false
      required:
      - header
      - payload

    QueryHeader:
      type: object
      properties:
        corr:
          type: string
        logCorr:
          type: string
        rcvTS:
          type: string
        http:
          type: string
        api:
          type: string
        agg:
          type: string
        refVintage:
          type: integer
        rc:
          type: integer
        ac:
          type: integer
        ai:
          type: string
        limitApplied:
          type: boolean
      required:
      - corr
      - logCorr
      - rcvTS
      - http
      - api
      - agg
      - refVintage
      - rc
      - ac
      - ai

    SqlRequest:
      type: object
      properties:
        query:
          type: string
          description: SQL expression. Must be a `SELECT`. No `INSERT`, `DROP`, or other extension is allowed.
      required:
      - query

    QSqlRequest:
      type: object
      properties:
        query:
          type: string
          description: Freeform q query
        agg:
          type: string
          description: |
            The gateway concatenates query results from each tier (RDB, IDB, HDB) by performing a `raze`. `agg` specifies a q lambda to be used instead. It can be specified as either:


            - A unary function, for example `"distinct"`.

            - A composition of named unary functions, for example `"'[distinct;raze]"`.

            - A unary lambda, for example `"{distinct raze x}"`.

      required:
      - query

    ListTablesResponse:
      allOf:
      - $ref: '#/components/schemas/SuccessEnvelope'
      - type: object
        properties:
          data:
            type: array
            items:
              type: string
            description: List of table names.
        required:
        - data

    DescribeTableResponse:
      $ref: '#/components/schemas/TableSpec'
