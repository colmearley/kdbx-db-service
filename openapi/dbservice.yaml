openapi: 3.0.3
info:
  title: KDB-X Database Service API
  version: 0.1.0
  description: OpenAPI spec for the KDB-X Database Service.
servers:
  - url: http://localhost:8080
tags:
- name: Tables
- name: Imports
- name: Query
paths:
  /api/v0/query/simple:
    post:
      tags:
      - Query
      operationId: simple
      summary: Structured query (parameterized)
      description: Structured query using explicit parameters (table, time range, filters, aggregations) rather than a free-form query string.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StructuredRequest'
            example:
              table: quote
              startTS: 2024.11.02T00:00:00.000
              endTS: 2024.11.03T00:00:00.000
              inputTZ: UTC
              outputTZ: UTC
              outputTZCols:
              - - createTS
                - updateTS
              filter:
              - - or
                - - '='
                  - sym
                  - DNDF.CAN
                - - '>'
                  - price
                  - '300.50'
              groupBy:
              - sym
              agg:
              - - minPx
                - min
                - price
              fill: zero
              temporality: slice
              sortCols:
              - sym
              - desc
              limit:
              - 3
      responses:
        '200':
          description: Query executed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: f98f13f8-621b-4721-b242-3afb94077441
                  logCorr: f98f13f8-621b-4721-b242-3afb94077441
                  rcvTS: '2026-01-22T07:36:33.459000000'
                  http: json
                  api: simple
                  agg: ':192.168.240.7:5060'
                  refVintage: -9223372036854776000
                  rc: 0
                  ac: 0
                  ai: ""
                  limitApplied: false
                payload:
                - time: 0D07:33:41.240573052
                  sym: X
                  realTime: '2026-01-24T07:33:41.240473052'
                  ask: 2.975187
                  asize: 14
                  bid: 45.16773
                  bsize: 36
                  sensorID: 0
                  randomID: 14
                - time: 0D07:33:41.240573118
                  sym: K
                  realTime: '2026-01-24T07:33:41.240473118'
                  ask: 36.78192
                  asize: 27
                  bid: 61.92058
                  bsize: 28
                  sensorID: 0
                  randomID: 0
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request (invalid query or parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: 457984f5-7e75-4544-95b8-59823844bf7b
                  logCorr: 457984f5-7e75-4544-95b8-59823844bf7b
                  version: 1
                  rcvTS: '2026-03-31T07:12:12.483000000'
                  http: json
                  api: .query.simple
                  agg: ''
                  refVintage: 0
                  rc: 56
                  ac: 27
                  ai: Table not found, table=quote
                payload: []
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python
        source: |
          session.query_simple(
              table="fxquote",
              startTS="2026.03.02D00:00:00.000",
              endTS="2026.03.03D00:00:00.000",
              sortCols=["ts"],
              limit=5,
          )
      - lang: q
        label: q
        source: |
          session.querySimple[`table`startTS`endTS`sortCols`limit!(`fxquote;2026.03.02D;2026.03.03D;enlist "ts"; 5)]
      - lang: cURL
        label: cURL
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/query/simple" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "table": "fxquote",
              "startTS": "2026.03.02D00:00:00",
              "endTS": "2026.03.03D00:00:00",
              "limit": 2
            }' | jq
  /api/v0/query/sql:
    post:
      tags:
      - Query
      operationId: sql
      summary: SQL query (free-form)
      description: Executes a SQL query string (SELECT-only) against the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SqlRequest'
            example:
              query: select sym, bid, ask from quote where bid > 100 by sym
      responses:
        '200':
          description: Query executed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: f98f13f8-621b-4721-b242-3afb94077441
                  logCorr: f98f13f8-621b-4721-b242-3afb94077441
                  rcvTS: '2026-01-22T07:36:33.459000000'
                  http: json
                  api: sql
                  agg: ':192.168.240.7:5060'
                  refVintage: -9223372036854776000
                  rc: 0
                  ac: 0
                  ai: ""
                  limitApplied: false
                payload:
                - sym: X
                  bid: 45.16773
                  ask: 2.975187
                - sym: K
                  bid: 61.92058
                  ask: 36.78192
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request (invalid query or parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: 457984f5-7e75-4544-95b8-59823844bf7b
                  logCorr: 457984f5-7e75-4544-95b8-59823844bf7b
                  version: 1
                  rcvTS: '2026-03-31T07:12:12.483000000'
                  http: json
                  api: .query.sql
                  agg: ''
                  refVintage: 0
                  rc: 56
                  ac: 27
                  ai: Table not found, table=quote
                payload: []
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python
        source: |
          session.query_sql(query="SELECT * FROM instruments WHERE category LIKE 'EM'")
      - lang: q
        label: q
        source: |
          session.querySQL[enlist[`query]!enlist "SELECT * FROM instruments WHERE category LIKE 'EM'"]
      - lang: cURL
        label: cURL
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/query/sql" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"query": "SELECT * FROM instruments WHERE category LIKE '\''EM'\''"}' | jq
  /api/v0/query/q:
    post:
      tags:
      - Query
      operationId: qsql
      summary: q query (free-form)
      description: Executes a q query string against the database.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QSqlRequest'
            example:
              query: select from quote where sym=`DNDF.CAN, price>300.5
              agg: '{select minPx:min price by sym from x}'
      responses:
        '200':
          description: Query executed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: f98f13f8-621b-4721-b242-3afb94077441
                  logCorr: f98f13f8-621b-4721-b242-3afb94077441
                  rcvTS: '2026-01-22T07:36:33.459000000'
                  http: json
                  api: qsql
                  agg: ':192.168.240.7:5060'
                  refVintage: -9223372036854776000
                  rc: 0
                  ac: 0
                  ai: ""
                  limitApplied: false
                payload:
                - sym: X
                  bid: 45.16773
                - sym: K
                  bid: 61.92058
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Bad request (invalid query or parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
              example:
                header:
                  corr: 457984f5-7e75-4544-95b8-59823844bf7b
                  logCorr: 457984f5-7e75-4544-95b8-59823844bf7b
                  version: 1
                  rcvTS: '2026-03-31T07:12:12.483000000'
                  http: json
                  api: .query.q
                  agg: ''
                  refVintage: 0
                  rc: 56
                  ac: 27
                  ai: Table not found, table=quote
                payload: []
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python
        source: |
          session.query_q(query="select o:first bid,h:max bid,l:min bid,c:last bid by trddate,sym from fxquote")
      - lang: q
        label: q
        source: |
          session.queryQ[enlist[`query]!enlist "select o:first bid,h:max bid,l:min bid,c:last bid by trddate,sym from fxquote"]
      - lang: cURL
        label: cURL
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/query/q" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"query": "select o:first bid,h:max bid,l:min bid,c:last bid by trddate,sym from fxquote"}' | jq
  /api/v0/imports/{jobId}:
    get:
      tags:
      - Imports
      operationId: ingestStatus
      summary: Get batch ingest job status
      description: Returns the current status of a batch ingest job.
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: Batch ingest job identifier.
      responses:
        '200':
          description: Success. Job status returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: &idImportCompleted
                name: 26adfb1d-29bc-fab9-5e32-73f80ea51300
                pipeline: ''
                database: db
                updtype: ingest
                status: completed
                details:
                  workerHandle: 34
                  preprocessDone: '2026-03-22T13:25:44.177025580'
                  subsessions:
                  - ''
                  dates:
                  - '2026-02-03'
                  tables:
                  - forex
                tbls:
                - forex
                dates:
                - '2026-02-03'
                progress:
                  cmdCurrent: ''
                  cmdIndex: 1
                  cmdTotal: 1
                  subCurrent: ''
                  subIndex: 0
                  subTotal: 0
                error: ''
                warnings: []
                updated: '2026-03-22T13:25:44.312559923'
        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: &idImportErrored
                name: 7800725b-df34-f6cf-d17f-7bdfd525c24e
                pipeline: ''
                database: db
                updtype: ingest
                status: errored
                details:
                  workerHandle: 34
                tbls: []
                dates: []
                progress:
                  cmdCurrent: ''
                  cmdIndex: null
                  cmdTotal: null
                  subCurrent: ''
                  subIndex: null
                  subTotal: null
                error: 'table does not exist in the schema, but createTable flag was not set to true: tables=,`quotes'
                warnings: []
                updated: '2026-03-31T07:39:08.699688365'
        '503': &id503
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python
        source: session.get_import(job_id="3fa85f64-5717-4562-b3fc-2c963f66afa6")
      - lang: q
        label: q
        source: |
          session.getImport["3fa85f64-5717-4562-b3fc-2c963f66afa6"]
      - lang: cURL
        label: cURL
        source: |
          curl -X GET "http://localhost:8080/api/v0/imports/NAME" \
            -H "Accept: application/json" | jq
          # Note: Replace `NAME` above, with the "name" value returned from the import job.
    delete:
      tags:
      - Imports
      operationId: ingestDelete
      summary: Cancel batch ingest job
      description: Attempts to cancel a running batch ingest job.
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: Batch ingest job identifier.
      responses:
        '200':
          description: Success. Job canceled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportCompleted

        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportErrored
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python
        source: session.cancel_import(job_id="3fa85f64-5717-4562-b3fc-2c963f66afa6")
      - lang: q
        label: q
        source: |
          session.cancelImport["3fa85f64-5717-4562-b3fc-2c963f66afa6"]
      - lang: cURL
        label: cURL
        source: |
          curl -X DELETE "http://localhost:8080/api/v0/imports/NAME" \
            -H "Accept: application/json" | jq
          # Note: Replace `NAME` above, with the "name" value returned from the import job.
  /api/v0/imports/files:
    post:
      tags:
      - Imports
      operationId: importFiles
      summary: Batch ingest from file(s) into a table
      description: Submit a batch ingest job for a table using files on the server. 
          
          
          For CSV ingest, processing order is `types` (initial parse), then `postparse` (transform/derive), then `include` (final output column selection). 
          

          Returns a pending job response; ingestion continues after the response. Final success/failure is available via GET /api/v0/imports/{jobId}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileIngestRequest'
            examples:
              fileIngestQuickStart:
                summary: Minimal request
                value:
                  table: quote
                  path: quote.csv
              fileIngest:
                summary: Standard file ingest
                value:
                  table: quote
                  path: quote.csv
                  mode: merge
                  format: csv
                  delimiter: ','
                  decimal: .
                  headerRowIndex: 0
              fileIngestCreateTable:
                summary: File ingest — create table
                value:
                  table: quote
                  path: quote.csv
                  format: csv
                  delimiter: ','
                  decimal: .
                  createTable: true
                  header:
                  - time
                  - sym
                  - realTime
                  - bid
                  - ask
                  - bidSize
                  - askSize
                  include:
                  - bid
                  - ask
                  types: '   FF  '
                  headerRowIndex: 0
      responses:
        '202':
          description: Ingest job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: &idImportPending
                name: 26adfb1d-29bc-fab9-5e32-73f80ea51300
                pipeline: ''
                database: db
                updtype: ingest
                status: pending
                details:
                  workerHandle: 34
                tbls: []
                dates: []
                progress:
                  cmdCurrent: ''
                  cmdIndex: 0
                  cmdTotal: 0
                  subCurrent: ''
                  subIndex: 0
                  subTotal: 0
                error: ''
                warnings: []
                updated: '2026-03-22T13:25:44.177025580'
        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportErrored
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleErrorResponse'
              example:
                error: Service unavailable.
      x-codeSamples:
      - lang: Python
        label: Python (minimal request)
        source: |
          session.import_files(
            table="fxquote",
            path="fxquote.parquet"
          )
      - lang: Python
        label: Python (standard file ingest)
        source: |
          session.import_files(
            table="fxquote", 
            path="fxquote.csv.gz", 
            format="csv", 
            delimiter=",", 
            decimal=".", 
            headerRowIndex= 0
          )
      - lang: Python
        label: Python (includes postparse)
        source: | 
          session.import_files(
            table="forex", 
            path="forex.csv", 
            format="csv", 
            types="SFFDV", 
            postparse="{\"time\": \"data[`date] + data`time\"}"
          )
      - lang: Python
        label: Python (ingest + auto create table)
        source: |
          session.import_files(
            table="instruments", 
            path="instruments.csv", 
            createTable=True
          )
      - lang: q
        label: q (minimal request)
        source: |
          session.importFiles[`table`path!("fxquote";"fxquote.parquet")]
      - lang: q
        label: q (standard file ingest)
        source: |
          session.importFiles[`table`path`format`delimiter`decimal`headerRowIndex!("fxquote";"fxquote.csv.gz";"csv";",";".";0)]
      - lang: q
        label: q (includes postparse)
        source: |
          session.importFiles[`table`path`format`types`postparse!("forex";"forex.csv";"csv";"SFFDV";{"time": "data[`date] + data`time"})]
      - lang: q
        label: q (ingest + auto create table)
        source: |
          session.importFiles[`table`path`createTable!("instruments";"instruments.csv";1b)]
      - lang: cURL
        label: cURL (minimal request)
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/imports/files" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "table": "fxquote",
              "path": "fxquote.parquet"
            }' | jq
      - lang: cURL
        label: cURL (standard file ingest)
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/imports/files" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "table": "fxquote",
              "path": "fxquote.csv.gz",
              "format": "csv",
              "delimiter": ",",
              "decimal": ".",
              "headerRowIndex": 0
            }' | jq
      - lang: cURL
        label: cURL (includes postparse)
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/imports/files" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "table": "forex",
              "path": "forex.csv",
              "format": "csv",
              "types": "SFFDV",
              "postparse": {"time": "data[`date] + data`time"}
            }' | jq
      - lang: cURL
        label: cURL (ingest + auto create table)
        source: |
          curl -s -X POST "http://localhost:8080/api/v0/imports/files" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "table": "instruments", 
              "path": "instruments.csv", 
              "createTable": "1"
            }' | jq
  /api/v0/imports/kdb:
    post:
      tags:
      - Imports
      operationId: ingestStart
      summary: Batch ingest from a kdb database
      description: >-
        Submit a batch ingest job for a kdb-native data location readable by the
        service. The provided path may reference a partitioned HDB directory and
        may also support other kdb-native layouts such as splayed tables or
        basic/q-binary tables. The service returns a job ID
        and continues ingestion asynchronously after the response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KdbIngestRequest'
            example:
              path: /path/to/hdb
              mode: merge
              createTable: false
      responses:
        '202':
          description: Ingest job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportPending
        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportErrored
        '503': *id503
      x-codeSamples:
      - lang: Python
        label: Python
        source: session.import_database(path="fxquote-hdb")
      - lang: q
        label: q
        source: |
          session.importKDB[enlist[`path]!enlist"fxquote-hdb"]
      - lang: cURL
        label: cURL
        source: |
          curl -X POST "http://localhost:8080/api/v0/imports/kdb" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"path": "fxquote-hdb"}' | jq
  /api/v0/imports/data:
    post:
      tags:
      - Imports
      operationId: importData
      summary: Ingest data from the JSON content of the request
      description: Insert data provided inline in the request body. Supports either a row-matrix (array of rows) or a list of JSON dictionaries (one object per row). Returns a pending job response; final success/failure is available via GET /api/v0/imports/{jobId}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataIngestRequest'
            examples:
              apiIngestRowMatrix:
                summary: Row matrix
                value:
                  table: quote
                  mode: merge
                  data:
                  - - '2026-01-21T10:00:00.000'
                    - AAPL
                    - 101.1
                    - 101.2
                  - - '2026-01-21T10:00:01.000'
                    - AAPL
                    - 101.2
                    - 101.3
              apiIngestObjects:
                summary: JSON objects
                value:
                  table: quote
                  data:
                  - timestamp: '2026-01-21T10:00:00.000'
                    sym: AAPL
                    bid: 101.1
                    ask: 101.2
                  - timestamp: '2026-01-21T10:00:01.000'
                    sym: AAPL
                    bid: 101.2
                    ask: 101.3
              apiIngestAutoCreateRowMatrix:
                summary: Row matrix — create table
                value:
                  table: quote
                  data:
                  - - '2026-01-21T10:00:00.000'
                    - AAPL
                    - 101.1
                    - 101.2
                  - - '2026-01-21T10:00:01.000'
                    - AAPL
                    - 101.2
                    - 101.3
                  createTable: true
                  columnNames:
                  - timestamp
                  - sym
                  - bid
                  - ask
                  types: PSFFF
              apiIngestAutoCreateObjects:
                summary: JSON objects — create table
                value:
                  table: quote
                  data:
                  - timestamp: '2026-01-21T10:00:00.000'
                    sym: AAPL
                    bid: 101.1
                    ask: 101.2
                  - timestamp: '2026-01-21T10:00:01.000'
                    sym: AAPL
                    bid: 101.2
                    ask: 101.3
                  createTable: true
                  columnNames:
                  - timestamp
                  - sym
                  - bid
                  - ask
                  types: PSFFF
      responses:
        '202':
          description: Ingest job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportPending
        '400':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchIngestStatusResponse'
              example: *idImportErrored
        '503': *id503
      x-codeSamples:
      - lang: Python
        label: Python (Rows payload)
        source: |
          session.import_data(
            table="fxquote",
            data=[
              ["2026-01-21", "2026-01-21T10:00:00.000", "EURUSD", 901.2, 901.3],
